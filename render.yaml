# Render Blueprint for DevReview AI — backend API + managed Postgres + Key Value (Redis).
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo → Apply.
# After the first deploy, set the values marked `sync: false` in the Render
# dashboard (Environment tab). See DEPLOYMENT.md for the full walkthrough.
#
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: devreview-db
    plan: free
    databaseName: devreview
    user: devreview

services:
  # ── Redis / cache (Render Key Value) ─────────────────────────────────────────
  - type: keyvalue
    name: devreview-redis
    plan: free
    ipAllowList: [] # only reachable from services in this Render account

  # ── Backend API (FastAPI) ────────────────────────────────────────────────────
  - type: web
    name: devreview-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head # run DB migrations before each deploy
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      # Secrets auto-generated by Render (never in source control)
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      # Wired automatically from the managed resources above
      - key: DATABASE_URL
        fromDatabase:
          name: devreview-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: devreview-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: devreview-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: devreview-redis
          property: connectionString
      - key: AI_PRIMARY_PROVIDER
        value: gemini
      # ── Set these manually in the dashboard after deploy (sync: false) ─────────
      # ALLOWED_ORIGINS  → your Vercel frontend URL, e.g. https://devreview-ai.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false
      # GITHUB_CALLBACK_URL → https://<your-frontend>.vercel.app/callback
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
